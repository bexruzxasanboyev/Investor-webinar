            padding: 0;
            box-sizing: border-box

        html,

            overflow-x: hidden
        }

        body {
            background-color: #FFDCAE
        }

        .hero {
            padding-top: 41px
        }

        .hero__container {
            max-width: 412px;
            margin: 0 auto;
            padding: 0 10px
        }

        .hero__top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 11px
        }

        .hero__date {
            background-color: #FF3225;
            border-radius: 280px;
            padding: 7px 14px
        }

        .hero__date-text {
            color: white;
            font-family: "RF Dewi Expanded", sans-serif;
            font-weight: 800;
            font-size: 17.73px;
            line-height: 100%;
            text-align: center;
            text-transform: uppercase
        }

        .hero__time {
            font-family: "RF Dewi Expanded", sans-serif;
            font-weight: 800;
            font-size: 24.62px;
            line-height: 100%;
            text-align: center;
            text-transform: uppercase
        }

        .hero__subtitle {
            font-family: "RF Dewi Extended", sans-serif;
            font-weight: 400;
            font-size: 23.58px;
            line-height: 31.05px;
            letter-spacing: -3%;
            margin-bottom: 9px;
            text-align: center
        }

        .hero__title {
            font-family: "RF Dewi Extended", sans-serif;
            font-weight: 700;
            font-size: clamp(30px, 9.5vw, 42px);
            line-height: 45.34px;
            letter-spacing: -3%;
            text-align: center;
            margin-bottom: 50px
        }

        .hero__image {
            max-width: clamp(300px, 50vw, 330px);
            width: 100%;
            height: auto;
            margin-left: 50px;
            display: flex;
            height: auto;
            margin-bottom: -30px
        }

        .hero__btn {
            max-width: 374px;
            width: 100%;
            background-color: #FF3225;
            text-decoration: none;
            box-shadow: 7px 10px 0px 0px #5A1F06;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            color: white;
            font-family: "RF Dewi Expanded", sans-serif;
            font-weight: 900;
            font-size: 24.38px;
            line-height: 100%;
            text-align: center;
            padding: 26px 0;
            position: relative;
            z-index: 1;
            margin-bottom: 22px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase
        }

        .hero__price {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 61px;
            max-width: 332px;
            width: 100%;
            margin-left: auto;
            margin-right: auto
        }

        .hero__old-price {
            font-family: "RF Dewi Expanded", sans-serif;
            font-weight: 900;
            font-size: 15px;
            line-height: 100%;
            text-align: center;
            text-transform: uppercase
        }

        .hero__new-price {
            font-family: "RF Dewi Expanded", sans-serif;
            font-weight: 900;
            font-size: 15px;
            line-height: 100%;
            text-transform: uppercase
        }

        @media (max-width:440px) {
            .hero__image {
                margin-left: 10px
            }

            .hero {
                padding-top: 20px
            }

            .hero__title {
                margin-bottom: 15px
            }
        }

        @media (max-width:340px) {
            .hero__image {
                margin-left: 0
            }
        }
    </style>

    <link rel="stylesheet" href="./css/main.css" media="print" onload="this.media='all'" />
    <noscript>
