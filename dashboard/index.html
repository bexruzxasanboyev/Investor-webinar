<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metrikca Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#09090b;color:#e0e0e0;font-family:-apple-system,'Segoe UI',sans-serif;padding:24px 32px;min-height:100vh}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;border-bottom:1px solid #1e1e22;padding-bottom:16px}
  .header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}
  .header h1 span{color:#D4AF37}
  .live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
  .live-text{font-size:12px;color:#888}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* Section titles */
  .section-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin:28px 0 14px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:#1e1e22}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
  .card{background:#111113;border:1px solid #1e1e22;border-radius:10px;padding:18px 16px}
  .card .label{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
  .card .value{font-size:28px;font-weight:700;color:#fff;line-height:1}
  .card .value.gold{color:#D4AF37}
  .card .value.green{color:#4ade80}
  .card .value.blue{color:#60a5fa}

  /* Chart */
  .chart-wrap{background:#111113;border:1px solid #1e1e22;border-radius:10px;padding:20px;margin-bottom:8px}
  .chart-wrap canvas{max-height:280px}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:14px;background:#111113;border:1px solid #1e1e22;border-radius:8px;padding:4px;width:fit-content}
  .tab{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;color:#666;cursor:pointer;border:none;background:transparent;transition:all 0.2s}
  .tab:hover{color:#aaa}
  .tab.active{background:#1e1e22;color:#D4AF37}

  /* Tables */
  .table-wrap{background:#111113;border:1px solid #1e1e22;border-radius:10px;overflow:hidden;margin-bottom:8px;display:none}
  .table-wrap.active{display:block}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.8px;background:#0c0c0e;border-bottom:1px solid #1e1e22}
  td{padding:10px 16px;font-size:13px;color:#bbb;border-bottom:1px solid #141416}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#141416}
  .rate{color:#4ade80;font-weight:600}
  .num{font-variant-numeric:tabular-nums;font-weight:500;color:#fff}

  /* Badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
  .badge-pv{background:rgba(96,165,250,0.12);color:#60a5fa}
  .badge-lead{background:rgba(74,222,128,0.12);color:#4ade80}

  /* Footer */
  .footer{text-align:center;padding:20px 0 8px;color:#333;font-size:11px}

  /* Empty state */
  .empty{color:#444;text-align:center;padding:30px 0;font-size:13px}

  @media(max-width:768px){
    body{padding:16px}
    .cards{grid-template-columns:1fr}
    .tabs{width:100%}
    .tab{flex:1;text-align:center}
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Metrikca</span> Dashboard</h1>
  <div><span class="live-dot"></span><span class="live-text">Real-time</span></div>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>Dan</label>
    <input type="date" id="dateFrom">
  </div>
  <div class="filter-group">
    <label>Gacha</label>
    <input type="date" id="dateTo">
  </div>
  <button class="filter-btn" id="filterBtn">Filtrlash</button>
  <button class="filter-btn reset" id="resetBtn">Tozalash</button>
</div>

<div class="section-title">Umumiy statistika</div>
<div class="cards" id="cards-total"></div>

<div class="section-title">Bugun</div>
<div class="cards" id="cards-today"></div>

<div class="section-title">Soatlik diagramma (bugun)</div>
<div class="chart-wrap">
  <canvas id="hourlyChart"></canvas>
</div>

<div class="section-title">Batafsil</div>
<div class="tabs" id="tabs">
  <button class="tab active" data-tab="hourly">Soatlik (bugun)</button>
  <button class="tab" data-tab="daily">Kunlik (30 kun)</button>
  <button class="tab" data-tab="recent">Oxirgi eventlar</button>
</div>

<div class="table-wrap active" id="tab-hourly">
  <table>
    <thead><tr><th>Soat</th><th>PageView</th><th>Lead</th><th>Rate</th></tr></thead>
    <tbody id="hourly"></tbody>
  </table>
</div>

<div class="table-wrap" id="tab-daily">
  <table>
    <thead><tr><th>Kun</th><th>PageView</th><th>Lead</th><th>Rate</th></tr></thead>
    <tbody id="daily"></tbody>
  </table>
</div>

<div class="table-wrap" id="tab-recent">
  <table>
    <thead><tr><th>Event</th><th>IP</th><th>Vaqt</th></tr></thead>
    <tbody id="recent"></tbody>
  </table>
</div>

<div class="footer">Metrikca &middot; Har 5 soniyada yangilanadi</div>

<script>
const API = "https://metrikainvestor.asosit.uz";
let hourlyChart = null;

// Tabs
document.getElementById("tabs").addEventListener("click", (e) => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".table-wrap").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
});

async function load() {
  const [stats, today, hourly, daily, recent] = await Promise.all([
    fetch(API + "/metrikca/stats").then(r => r.json()),
    fetch(API + "/metrikca/stats/today").then(r => r.json()),
    fetch(API + "/metrikca/stats/hourly").then(r => r.json()),
    fetch(API + "/metrikca/stats/daily").then(r => r.json()),
    fetch(API + "/metrikca/stats/recent").then(r => r.json())
  ]);

  // Total cards
  document.getElementById("cards-total").innerHTML =
    card("Jami PageView", stats.pageviews || 0, "blue") +
    card("Jami Lead", stats.leads || 0, "green") +
    card("Lead Rate", stats.lead_rate, "gold");

  // Today cards
  document.getElementById("cards-today").innerHTML =
    card("Bugun PageView", today.pageviews || 0, "blue") +
    card("Bugun Lead", today.leads || 0, "green") +
    card("Bugun Rate", today.lead_rate, "gold");

  // Chart.js
  renderChart(hourly);

  // Hourly table
  document.getElementById("hourly").innerHTML = hourly.map(r =>
    `<tr><td>${r.hour}</td><td class="num">${r.pageviews}</td><td class="num">${r.leads}</td><td class="rate">${r.lead_rate}</td></tr>`
  ).join("") || `<tr><td colspan=4 class="empty">Ma'lumot yo'q</td></tr>`;

  // Daily table
  document.getElementById("daily").innerHTML = daily.map(r =>
    `<tr><td>${r.day}</td><td class="num">${r.pageviews}</td><td class="num">${r.leads}</td><td class="rate">${r.lead_rate}</td></tr>`
  ).join("") || `<tr><td colspan=4 class="empty">Ma'lumot yo'q</td></tr>`;

  // Recent events
  document.getElementById("recent").innerHTML = recent.map(r =>
    `<tr><td><span class="badge ${r.event === 'Lead' ? 'badge-lead' : 'badge-pv'}">${r.event}</span></td><td style="font-family:monospace;font-size:12px">${r.ip}</td><td style="color:#666">${r.created_at}</td></tr>`
  ).join("") || `<tr><td colspan=3 class="empty">Ma'lumot yo'q</td></tr>`;
}

function card(label, value, color) {
  return `<div class="card"><div class="label">${label}</div><div class="value ${color}">${value}</div></div>`;
}

function renderChart(hourly) {
  const ctx = document.getElementById("hourlyChart").getContext("2d");
  const labels = hourly.map(r => r.hour);
  const pvData = hourly.map(r => r.pageviews);
  const leadData = hourly.map(r => r.leads);

  if (hourlyChart) {
    hourlyChart.data.labels = labels;
    hourlyChart.data.datasets[0].data = pvData;
    hourlyChart.data.datasets[1].data = leadData;
    hourlyChart.update("none");
    return;
  }

  hourlyChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: "PageView",
          data: pvData,
          backgroundColor: "rgba(96, 165, 250, 0.7)",
          hoverBackgroundColor: "rgba(96, 165, 250, 1)",
          borderRadius: 4,
          borderSkipped: false
        },
        {
          label: "Lead",
          data: leadData,
          backgroundColor: "rgba(74, 222, 128, 0.7)",
          hoverBackgroundColor: "rgba(74, 222, 128, 1)",
          borderRadius: 4,
          borderSkipped: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: "index",
        intersect: false
      },
      plugins: {
        legend: {
          position: "top",
          align: "end",
          labels: {
            color: "#888",
            font: { size: 11, weight: "500" },
            boxWidth: 12,
            boxHeight: 3,
            borderRadius: 2,
            useBorderRadius: true,
            padding: 16
          }
        },
        tooltip: {
          backgroundColor: "#1a1a1a",
          titleColor: "#fff",
          bodyColor: "#ccc",
          borderColor: "#333",
          borderWidth: 1,
          cornerRadius: 8,
          padding: 12,
          titleFont: { size: 13, weight: "600" },
          bodyFont: { size: 12 },
          displayColors: true,
          callbacks: {
            title: (items) => items[0].label + ":00",
            afterBody: (items) => {
              const pv = items[0]?.raw || 0;
              const ld = items[1]?.raw || 0;
              const rate = pv > 0 ? ((ld / pv) * 100).toFixed(1) : "0.0";
              return "\nLead Rate: " + rate + "%";
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: "#1a1a1a" },
          ticks: { color: "#555", font: { size: 11 } }
        },
        y: {
          beginAtZero: true,
          grid: { color: "#1a1a1a" },
          ticks: {
            color: "#555",
            font: { size: 11 },
            stepSize: 1,
            precision: 0
          }
        }
      }
    }
  });
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
